name: AI discovery audit

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: read

concurrency:
  group: ai-discovery-audit
  cancel-in-progress: true

jobs:
  audit:
    name: Check crawler and citation readiness
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit production
        run: node scripts/audit-ai-discovery.mjs https://www.aulafy.net
